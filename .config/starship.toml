format = """
${custom.sso}\
$kubernetes\
$hostname\
$directory\
$git_branch\
$git_state\
$cmd_duration\
$line_break\
$character"""

[kubernetes]
disabled = false

[hostname]
ssh_only = false
style = "green"
ssh_symbol = "󰌘 "

[directory]
style = "blue"

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
format = "[$branch]($style) "
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

# Warn when the AWS SSO session has expired. Only active on hosts where AWS SSO
# has been configured (the cache directory exists), so it is inert elsewhere.
[custom.sso]
when = '[ -d "$HOME/.aws/sso/cache" ]'
shell = ["bash", "--noprofile", "--norc"]
command = '''
now=$(date +%s)
for f in "$HOME"/.aws/sso/cache/*.json; do
  [ -f "$f" ] || continue
  grep -q registrationExpiresAt "$f" && grep -q '"expiresAt"' "$f" || continue
  exp=$(jq -r .expiresAt <"$f")
  ts=$(date -d "$exp" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$exp" +%s 2>/dev/null)
  [ -n "$ts" ] && [ $((ts + 36000)) -gt "$now" ] && exit 0
done
echo "[sso-logout]"
'''
format = '([$output](bold red) )'
