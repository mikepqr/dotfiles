format = """
${custom.sso}\
$kubernetes\
$hostname\
$directory\
$git_branch\
$git_state\
$cmd_duration\
$line_break\
$character"""

[kubernetes]
disabled = false

[hostname]
ssh_only = false
style = "green"
ssh_symbol = "󰌘 "

[directory]
style = "blue"

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
format = "[$branch]($style) "
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

# Warn when AWS SSO and/or gcloud need a fresh login. The check lives in an
# external script so it stays inert on hosts that lack it.
[custom.sso]
when = '[ -x "$HOME/.local/bin/check-cloud-auth" ]'
shell = ["bash", "--noprofile", "--norc"]
command = '"$HOME/.local/bin/check-cloud-auth" || true'
format = '([$output](bold red) )'
